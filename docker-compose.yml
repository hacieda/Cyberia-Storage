services:
  client:
    build: ./client
    ports:
      - "80:80"
    networks:
      - internal
    restart: always

  api:
    build: ./server
    networks:
      - internal
    ports:
      - "5000:80"
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cyberia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
